<!DOCTYPE html>
<html>
<head>
  <title>Odd Numbers Example</title>
</head>
<body>
  <h2>Open your browser console to see the output</h2>

  <script>
   
    let i = 1; 
    while (i < 50) { 
      if (i % 2 === 0) { 
        i++;        
        continue;   
      } 
      console.log(i); 
      i++; 
    }
  </script>
</body>
</html>
