<!DOCTYPE html>
<html>
<head>
  <title>Shapes Array Example</title>
</head>
<body>
  <h1>Check the console for output</h1>

  <script>
    // Create the array of shapes
    let arrOfShapes = ["circle", "triangle", "rectangle", "pentagon"];

    // Replace 2 items starting at index 2 with "square" and "trapezoid"
    arrOfShapes.splice(2, 2, "square", "trapezoid");

    // Output the updated array to the console
    console.log("Updated Shapes Array:", arrOfShapes);
  </script>
</body>
</html>
