<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>3D Array Example</title>
</head>
<body>
  <h1>JavaScript 3D Array Example</h1>
  <pre id="output"></pre>

  <script>
    
    let arr3D = [
      [ [1, 2, 3], [4, 5, 6], [7, 8, 9] ],
      [ [1, 2, 3], [4, 5, 6], [7, 8, 9] ],
      [ [1, 2, 3], [4, 5, 6], [7, 8, 9] ]
    ];

    
    let outputText = "";
    outputText += "arr3D[0][1][2] = " + arr3D[0][1][2] + "\n"; // 6
    outputText += "arr3D[2][0][0] = " + arr3D[2][0][0] + "\n"; // 1

    
    outputText += "\nIterating through arr3D:\n";
    for (let i = 0; i < arr3D.length; i++) {
      for (let j = 0; j < arr3D[i].length; j++) {
        for (let k = 0; k < arr3D[i][j].length; k++) {
          outputText += arr3D[i][j][k] + " ";
        }
        outputText += "\n";
      }
      outputText += "\n";
    }

    
    let flattened = arr3D.flat(2); 
    outputText += "\nFlattened array:\n" + flattened.join(", ");

    
    document.getElementById("output").textContent = outputText;
  </script>
</body>
</html>
