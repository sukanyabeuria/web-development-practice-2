<!DOCTYPE html>
<html>
<head>
  <title>Shopping List Example</title>
</head>
<body>
  <h1>Open the console to see the results</h1>

  <script>
    // 1. Create an array with 3 items
    let shoppingList = ["Milk", "Bread", "Apples"];

    // 2. Check the list length in the console
    console.log("List length:", shoppingList.length);

    // 3. Update "Bread" to "Bananas"
    shoppingList[1] = "Bananas";

    // 4. Output the entire list to the console
    console.log("Updated shopping list:", shoppingList);
  </script>
</body>
</html>
