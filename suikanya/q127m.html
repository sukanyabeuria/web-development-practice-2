<!DOCTYPE html>
<html>
<head>
 
<body>
  
  <script>
   
    console.log("PI value:", Math.PI);

    
    console.log( Math.ceil(5.7));  
    console.log( Math.round(5.7));
    console.log( Math.floor(5.7)); 

    
    console.log("Random value:", Math.random());

    
    console.log("Random 0–10:", Math.floor(Math.random() * 11));

    
    console.log("Random 1–10:", Math.floor(Math.random() * 10) + 1);

   
    console.log("Random 1–100:", Math.floor(Math.random() * 100) + 1);

    
    function randomBetween(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    console.log("Running randomBetween(1, 100) 100 times:");
    for (let i = 0; i < 100; i++) {
      console.log(randomBetween(1, 100));
    }
  </script>
</body>
</html>
