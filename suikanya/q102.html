<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Add Function Example</title>
</head>
<body>
  <h1>JavaScript Function Demo</h1>

  <script>
    
    function addNumbers(a, b) {
      return a + b;
    }

    let num1 = 10;
    let num2 = 20;

    let result1 = addNumbers(num1, num2);
    console.log("First result:", result1);

    let result2 = addNumbers(5, 7);
    console.log("Second result:", result2);
  </script>
</body>
</html>
