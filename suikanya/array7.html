<!DOCTYPE html>
<html>
<head>
  <title>Shopping List Example</title>
</head>
<body>
  <h2>Shopping List Operations</h2>
  <div id="output"></div>

  <script>
    let output = document.getElementById("output");

    // 1. Create an empty array
    let shoppingList = [];

    // 2. Add Milk, Bread, Apples
    shoppingList.push("Milk", "Bread", "Apples");

    // 3. Update "Bread" with Bananas and Eggs
    let breadIndex = shoppingList.indexOf("Bread");
    if (breadIndex !== -1) {
      shoppingList.splice(breadIndex, 1, "Bananas", "Eggs");
    }

    // 4. Remove the last item and output it
    let removedItem = shoppingList.pop();
    console.log("Removed item:", removedItem);

    // 5. Sort alphabetically
    shoppingList.sort();

    // 6. Find index of Milk
    let milkIndex = shoppingList.indexOf("Milk");
    console.log("Index of Milk:", milkIndex);

    // 7. After Bananas, add Carrots and Lettuce
    let bananasIndex = shoppingList.indexOf("Bananas");
    if (bananasIndex !== -1) {
      shoppingList.splice(bananasIndex + 1, 0, "Carrots", "Lettuce");
    }

    // 8. Create new list with Juice and Pop
    let newList = ["Juice", "Pop"];

    // 9. Combine both lists, adding new list twice
    let combinedList = shoppingList.concat(newList, newList);

    // 10. Get last index of Pop
    let lastPopIndex = combinedList.lastIndexOf("Pop");
    console.log("Last index of Pop:", lastPopIndex);

    // Display results on page
    output.innerHTML = `
      <p><strong>Shopping List after operations:</strong> ${shoppingList.join(", ")}</p>
      <p><strong>Combined List:</strong> ${combinedList.join(", ")}</p>
      <p><strong>Removed Item:</strong> ${removedItem}</p>
      <p><strong>Index of Milk:</strong> ${milkIndex}</p>
      <p><strong>Last Index of Pop:</strong> ${lastPopIndex}</p>
    `;
  </script>
</body>
</html>
