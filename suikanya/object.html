<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Company Object Console Example</title>
</head>
<body>
  <h1>Open your browser console to see the output</h1>

  <script>
    // Define the company object
    let company = { 
      companyName: "Healthy Candy", 
      activity: "food manufacturing", 
      address: { 
        street: "2nd street", 
        number: "123", 
        zipcode: "33116", 
        city: "Miami", 
        state: "Florida" 
      }, 
      yearOfEstablishment: 2021  
    };

    // Display the whole object in the console
    console.log("Company object:", company);

    // Access individual properties
    console.log("Company Name:", company.companyName);
    console.log("Activity:", company.activity);
    console.log("Year Established:", company.yearOfEstablishment);

    // Access nested properties
    console.log("Street:", company.address.street);
    console.log("City:", company.address.city);
    console.log("State:", company.address.state);

    // Print full address
    console.log("Full Address:", 
      company.address.number + " " + company.address.street + ", " +
      company.address.city + ", " + company.address.state + " " + company.address.zipcode
    );
  </script>
</body>
</html>
