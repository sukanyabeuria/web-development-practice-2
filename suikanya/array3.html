<!DOCTYPE html>
<html>
<head>
  <title>Favorite Fruits Example</title>
</head>
<body>
  <h1>Check the console for output</h1>

  <script>
    // Create the array
    let favoriteFruits = ["grapefruit", "orange", "lemon"];

    // Add "tangerine" to the array
    favoriteFruits.push("tangerine");

    // Output the updated array to the console
    console.log("Favorite Fruits:", favoriteFruits);
  </script>
</body>
</html>
