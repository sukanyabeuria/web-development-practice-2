<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Names Loop Example</title>
</head>
<body>
  <h1>JavaScript For Loop Demo</h1>
  <p>Names from the array:</p>
  <ul id="namesList"></ul>

  <script>
    let names = ["Chantal", "John", "Maxime", "Bobbi", "Jair"];

   
    for (let i = 0; i < names.length; i++) {
      console.log(names[i]); 
      let li = document.createElement("li");
      li.textContent = names[i];
      document.getElementById("namesList").appendChild(li);
    }
  </script>
</body>
</html>
