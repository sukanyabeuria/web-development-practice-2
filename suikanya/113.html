<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Console Log Example</title>
</head>
<body>
  <h1>Check the Console!</h1>
  <button onclick="runExample()">Run Example</button>

  <script>
    
    function doFlexibleStuff(callback) {
      console.log("Doing flexible stuff...");
      callback();
    }

    
    let anotherFunctionVariable = function() { 
      console.log("Another anonymous function implementation."); 
    } 

    
    function runExample() {
      doFlexibleStuff(anotherFunctionVariable);
    }
  </script>
</body>
</html>
