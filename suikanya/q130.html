<!DOCTYPE html>
<html>
<head>
  <title>Capitalize Words Demo</title>
</head>
<body>
  <h2>Capitalize Each Word</h2>
  <p id="output"></p>

  <script>
    
    let sentence = "thIs will be capiTalized for each word";

    
    function capitalizeWords(str) {
     
      str = str.toLowerCase();

      
      let capitalizedArray = [];

     
      let words = str.split(" ");

     
      words.forEach(word => {
        
    let capitalizedWord = word.slice(0, 1).toUpperCase() + word.slice(1);
     capitalizedArray.push(capitalizedWord);
      });
      return capitalizedArray.join(" ");
    }

    let result = capitalizeWords(sentence);
    document.getElementById("output").textContent = result;
    console.log(result);
  </script>
</body>
</html>
