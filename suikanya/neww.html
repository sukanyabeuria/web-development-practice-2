<!DOCTYPE html>
<html>
<head>
  <title>document</title>
  <style>
    #rectangle {
      width: 150px;
      height: 100px;
      background-color: black;
      margin: 10px;
    }
    .hide {
      display: none;
    }
    button {
      margin: 5px;
      padding: 8px 12px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div id="rectangle"></div>
         
  <button onclick="hideShow()">Hide/Show</button>
  

  <script>
    function hideShow() {
      let div = document.getElementById('rectangle');
      div.classList.toggle('hide');
    }
  </script>
</body>
</html>
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
    #rectangle {
      width: 150px;
      height: 100px;
      background-color: black;
      margin: 10px;
      
    }
    .zoom {
      transform: scale(1.5); 
    }
    button {
      margin: 5px;
      padding: 8px 12px;
      font-size: 14px;
    }
  </style>
</head>
<body>
     <div id="rectangle"></div>
         
  <button onclick="zoomToggle()">Zoom In/Out</button>
  

  <script>
    function zoomToggle() {
      let div = document.getElementById('rectangle');
      div.classList.toggle('zoom');
    }
  </script>
</body>
</html>
