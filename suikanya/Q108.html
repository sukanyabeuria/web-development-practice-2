<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Always 5 Example</title>
</head>
<body>
  <h1>Always 5 Demo</h1>

  <script>
    function addTwoNumbers() {
      console.log(2 + 3); 
    }

    
    addTwoNumbers(6, 5);        
    addTwoNumbers(10);  
    addTwoNumbers();      
    addTwoNumbers(10, 20, 30, 40, 50);     
  </script>
</body>
</html>
