<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Person Class Fullname Example</title>
</head>
<body>
  <h1>Check the Console Output</h1>

  <script>
    
    class Person {
      constructor(firstname, lastname) {
        this.firstname = firstname;
        this.lastname = lastname;
      }


      fullname() {
        return this.firstname + " " + this.lastname;
      }
    }

    
    let person1 = new Person("Alice", "Johnson");
    let person2 = new Person("Bob", "Smith");


    console.log("Hello " + person1.fullname());
    console.log("Hello " + person2.fullname());
  </script>
</body>
</html>
